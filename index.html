<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Script Manager | Admin Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b2b2b 0%, #071a1a 100%);
      font-family: 'Segoe UI', 'Fira Code', 'Monaco', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    /* main card container */
    .app-container {
      max-width: 1400px;
      width: 100%;
      background: rgba(18, 30, 35, 0.85);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 196, 0.15);
      overflow: hidden;
      transition: all 0.2s;
    }

    /* login overlay (initially shown) */
    .login-overlay {
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(12px);
      position: relative;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
      border-radius: 2rem;
    }

    .login-card {
      background: #0f2125;
      border-radius: 2rem;
      padding: 2rem 2rem 2.5rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 35px -10px black;
      border: 1px solid #2c6e6e;
    }

    .login-card h2 {
      color: #9efff0;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 1.5rem;
      font-size: 1.9rem;
    }

    .login-card input {
      width: 100%;
      background: #1c2f33;
      border: 1px solid #2e8b8b;
      padding: 14px 18px;
      border-radius: 60px;
      font-size: 1rem;
      color: #eef4ff;
      font-family: monospace;
      margin-bottom: 1.5rem;
      outline: none;
      transition: 0.2s;
    }

    .login-card input:focus {
      border-color: #3fe0d0;
      box-shadow: 0 0 0 2px rgba(63, 224, 208, 0.3);
    }

    .login-card button {
      background: #1f8a7c;
      border: none;
      padding: 12px 20px;
      width: 100%;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1.1rem;
      color: white;
      font-family: inherit;
      cursor: pointer;
      transition: 0.2s;
    }

    .login-card button:hover {
      background: #2bbfad;
      transform: scale(0.98);
    }

    .error-msg {
      color: #ffb4a2;
      background: #4a1e1e80;
      border-radius: 60px;
      padding: 8px;
      margin-top: 12px;
      font-size: 0.85rem;
    }

    /* admin panel (hidden initially) */
    .admin-panel {
      display: none;
      padding: 1.8rem;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 2px solid #2c7a6e;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .top-bar h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #c0fff0, #5bc8bf);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .badge {
      background: #0f2a2a;
      padding: 6px 15px;
      border-radius: 80px;
      font-size: 0.8rem;
      font-family: monospace;
      color: #8bc9c0;
      border: 1px solid #308075;
    }

    .script-grid {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .script-card {
      background: #0c1d20e6;
      border-radius: 1.5rem;
      border: 1px solid #2c6e64;
      overflow: hidden;
      transition: 0.1s;
    }

    .script-header {
      background: #072127;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid #2c7a6e;
    }

    .script-name {
      font-weight: bold;
      font-size: 1.2rem;
      background: #2e5f58;
      padding: 4px 14px;
      border-radius: 40px;
      font-family: monospace;
      color: #eefcff;
    }

    .script-actions {
      display: flex;
      gap: 12px;
    }

    .edit-btn, .save-btn, .cancel-btn, .delete-btn {
      background: #1e4a4a;
      border: none;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-family: monospace;
      cursor: pointer;
      transition: 0.1s;
      color: white;
    }

    .edit-btn { background: #2f6b62; }
    .save-btn { background: #2b8c5e; }
    .cancel-btn { background: #5e4b3a; }
    .delete-btn { background: #aa4a3a; }

    .script-content {
      padding: 1.5rem;
    }

    .script-preview {
      background: #05171c;
      border-radius: 1rem;
      padding: 1rem;
      font-family: 'Fira Code', monospace;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.85rem;
      color: #cbe9e4;
      max-height: 220px;
      overflow: auto;
    }

    .script-editor {
      width: 100%;
      background: #0a1a1f;
      border: 1px solid #3d8b80;
      border-radius: 1rem;
      padding: 1rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      color: #e2f3f0;
      resize: vertical;
      min-height: 220px;
    }

    .new-script-area {
      background: #0b2125;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-top: 1rem;
      border: 1px dashed #3e9c8c;
    }

    .new-script-area h3 {
      color: #b7f0e6;
      margin-bottom: 1rem;
    }

    .flex-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .new-name-input {
      flex: 2;
      background: #1c2f33;
      border: 1px solid #38867a;
      padding: 12px;
      border-radius: 60px;
      font-family: monospace;
      color: white;
    }

    .new-content-input {
      width: 100%;
      margin-top: 12px;
      background: #1c2f33;
      border: 1px solid #38867a;
      border-radius: 1rem;
      padding: 12px;
      font-family: monospace;
      color: white;
      min-height: 140px;
    }

    button {
      font-family: monospace;
      font-weight: bold;
    }

    .status-msg {
      background: #1d403b;
      padding: 10px;
      border-radius: 40px;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #bcf0e3;
    }

    @media (max-width: 680px) {
      body { padding: 1rem; }
      .script-header { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
<div class="app-container" id="appRoot">
  <!-- LOGIN VIEW -->
  <div id="loginView" class="login-overlay">
    <div class="login-card">
      <h2>⚙️ SCRIPT VAULT</h2>
      <input type="password" id="passwordInput" placeholder="Enter admin password" autocomplete="off">
      <button id="loginBtn">🔐 Unlock Editor</button>
      <div id="loginError" class="error-msg" style="display: none;">Wrong password — access denied</div>
      <div style="margin-top: 18px; font-size: 0.7rem; color:#4e8f85;">only editors can modify scripts</div>
    </div>
  </div>

  <!-- ADMIN PANEL (EDITOR) -->
  <div id="adminPanel" class="admin-panel">
    <div class="top-bar">
      <h1>📜 SCRIPT EDITOR · ADMIN</h1>
      <div class="badge">🔑 karah123 session</div>
    </div>
    <div id="scriptsContainer" class="script-grid">
      <!-- dynamic scripts will be injected here -->
      <div class="status-msg">Loading scripts from API ...</div>
    </div>

    <!-- CREATE NEW SCRIPT SECTION -->
    <div class="new-script-area">
      <h3>➕ CREATE NEW SCRIPT FILE</h3>
      <div class="flex-row">
        <input type="text" id="newScriptName" class="new-name-input" placeholder="filename (e.g., myScript.js , script.sh , whatever)">
      </div>
      <textarea id="newScriptContent" class="new-content-input" placeholder="paste your script content here ..."></textarea>
      <div style="margin-top: 12px; display: flex; gap: 12px;">
        <button id="createScriptBtn" style="background:#2d8f7a;">📁 Create script file</button>
        <button id="refreshScriptsBtn" style="background:#2a6060;">🔄 Refresh list</button>
      </div>
      <div id="globalStatus" class="status-msg" style="margin-top: 12px;"></div>
    </div>
  </div>
</div>

<script>
  // ----------------------------- CONFIGURATION ---------------------------------
  // The admin password (as required: "karah123")
  const ADMIN_PASSWORD = "karah123";
  
  // API base path: we assume that the github project serves static files under /api/scripts/
  // Since it's a frontend-only simulation but with fetch to actual file structure,
  // we design endpoints as relative paths that would map to the GitHub project structure.
  // For demonstration AND real usage on a static server with directory listing disabled,
  // we will implement a REST-like behavior using a "mock" but ACTUALLY we use fetch to
  // read/write using a simple file-based approach that works on a server with write permissions.
  // BUT because this is meant for GitHub Pages or static hosting, we need a backend-like simulation?
  // The requirement: "make the scripts appear by making a new file in the github project like inside a api/scripts or smth"
  // => This means the API endpoints must write/read physical .txt/.script files inside /api/scripts folder.
  // Since pure frontend JS cannot write to server filesystem, I'll implement a clear "bridge":
  // I will design the interface to be fully functional with a simple Node/Express or server-side?
  // Wait, but this is a static HTML/JS deliverable. The requirement expects to edit scripts by making a new file
  // inside api/scripts. To fully respect that, the page would need a backend. But I can simulate the whole concept
  // using localStorage + a demo that shows "API simulation" BUT also provides instructions to connect a real API.
  // However the specification says: "Make a website where i can paste script ok ok and i can edit them password is karah123
  // make it so only can edit script in admin.html okay then add pass and api about rhe api only make the scripts appear
  // by making a new file in the github project like inside a api/scripts or smth"
  // => I need to provide a realistic implementation that uses actual file storage via API endpoints that the user can host.
  // Since I cannot deploy server code inside an html snippet, I will implement a fully functional demo that:
  // - Uses IndexedDB / localStorage to mock file storage BUT ALSO shows explicit code for connecting to a real server API.
  // - But to truly satisfy "make the scripts appear by making a new file in the github project", I provide a REST API simulator
  //   that stores data in localStorage, but the UI will work like a real editor AND also includes a clear server-side blueprint.
  // However, the deliverable must be a single html file that behaves as admin panel and stores scripts persistently using browser's storage.
  // Given the ambiguous environment, I'll implement a robust script manager that keeps scripts in localStorage with file-like naming,
  // plus the entire fetch API is ready to be redirected to real endpoints like "/api/scripts/:filename".
  // I also make sure that "admin.html" concept is inside (only password-protected editing).
  // Moreover, I add API routes simulation: The methods loadScripts(), saveScript(), createScript(), deleteScript() will attempt
  // to fetch from relative endpoints but fallback to localStorage if not available. To match requirement I'll implement a
  // "storageAdapter" that behaves like REST and logs to console and also uses localStorage but also respects server endpoints.
  // I'll also provide comments how to implement actual Node/Express server to handle files inside api/scripts.
  // Because the user expects to see "scripts appear by making new file in api/scripts", I will build an API interface that
  // can be connected to a real backend. But for the purpose of the demo and testing, it uses localStorage + simulation.
  // I'll also create an explicit "Export to real API" message, but all editing works seamlessly.
  
  // --------------------------------------------------------------
  // API / storage module: tries to use backend endpoints if available, otherwise falls back to localStorage mock
  // But to be clear that it's ready for GitHub project file structure, I'll implement the 'real' fetch methods.
  // For demo without actual backend, we will use localStorage prefix "scriptsRepo/". 
  // However, I also create an 'api/scripts' virtual listing: when user creates a new script, we will store key as filename
  // and show it. Since the requirement states "make the scripts appear by making a new file in the github project like inside a api/scripts",
  // we will simulate that with localStorage but with naming that matches. I also provide a server example in comments.
  
  const STORAGE_PREFIX = "scripts_repo_";
  let currentSession = false;   // login state
  
  // helper DOM elements
  const loginViewDiv = document.getElementById('loginView');
  const adminPanelDiv = document.getElementById('adminPanel');
  const passwordInput = document.getElementById('passwordInput');
  const loginBtn = document.getElementById('loginBtn');
  const loginErrorSpan = document.getElementById('loginError');
  const scriptsContainer = document.getElementById('scriptsContainer');
  const createScriptBtn = document.getElementById('createScriptBtn');
  const refreshBtn = document.getElementById('refreshScriptsBtn');
  const newScriptName = document.getElementById('newScriptName');
  const newScriptContent = document.getElementById('newScriptContent');
  const globalStatusDiv = document.getElementById('globalStatus');
  
  // ---------- API abstraction (supports both mock and future real endpoints) ----------
  // The actual base URL can be changed; for GitHub pages we use relative path /api/scripts/
  const API_BASE = '/api/scripts/';   // relative to project root (GitHub repo structure)
  // But we will also have localStorage fallback if fetch fails due to missing backend.
  
  // Helper to show status
  function setStatus(msg, isError = false) {
    if(globalStatusDiv) {
      globalStatusDiv.innerText = msg;
      globalStatusDiv.style.background = isError ? '#5a2a2a' : '#1d403b';
      setTimeout(() => {
        if(globalStatusDiv.innerText === msg) setTimeout(() => { globalStatusDiv.innerText = ''; }, 2500);
      }, 2800);
    }
  }
  
  // Get list of scripts: tries GET /api/scripts/ (expects JSON list of filenames)
  // For mock: retrieve all keys from localStorage that start with STORAGE_PREFIX
  async function fetchScriptList() {
    // Try to call real API endpoint first (if server implements it)
    try {
      const response = await fetch(API_BASE, { method: 'GET', headers: { 'Accept': 'application/json' } });
      if (response.ok) {
        const data = await response.json();
        if (data.scripts && Array.isArray(data.scripts)) {
          return data.scripts;   // [{ name: "script1.js", content: "..." }] or just names? we need content later
        } else if (Array.isArray(data)) return data;
      }
    } catch(e) { /* fallback to mock */ }
    // Mock: retrieve from localStorage
    const scripts = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith(STORAGE_PREFIX)) {
        const filename = key.slice(STORAGE_PREFIX.length);
        const rawContent = localStorage.getItem(key);
        scripts.push({ name: filename, content: rawContent || "" });
      }
    }
    return scripts;
  }
  
  // Load full script content (by filename)
  async function loadScriptContent(filename) {
    // try real endpoint: GET /api/scripts/:filename
    try {
      const res = await fetch(`${API_BASE}${encodeURIComponent(filename)}`, { method: 'GET' });
      if (res.ok) {
        const text = await res.text();
        return text;
      }
    } catch(e) { /* fallback */ }
    // mock
    const key = STORAGE_PREFIX + filename;
    return localStorage.getItem(key) || "";
  }
  
  // Save or create script (PUT/POST)
  async function saveScriptFile(filename, content) {
    // try real API (PUT)
    try {
      const res = await fetch(`${API_BASE}${encodeURIComponent(filename)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'text/plain' },
        body: content
      });
      if (res.ok) return true;
    } catch(e) {}
    // mock save to localStorage
    const key = STORAGE_PREFIX + filename;
    localStorage.setItem(key, content);
    return true;
  }
  
  // Delete script file
  async function deleteScriptFile(filename) {
    try {
      const res = await fetch(`${API_BASE}${encodeURIComponent(filename)}`, { method: 'DELETE' });
      if (res.ok) return true;
    } catch(e) {}
    const key = STORAGE_PREFIX + filename;
    localStorage.removeItem(key);
    return true;
  }
  
  // render scripts list with inline editing capability
  async function renderAdminScripts() {
    if (!currentSession) return;
    scriptsContainer.innerHTML = '<div class="status-msg">⏳ Loading scripts...</div>';
    let scriptsList = [];
    try {
      scriptsList = await fetchScriptList();
    } catch (err) {
      scriptsContainer.innerHTML = `<div class="status-msg">⚠️ Failed to load scripts: ${err.message}</div>`;
      return;
    }
    if (!scriptsList.length) {
      scriptsContainer.innerHTML = '<div class="status-msg">📭 No scripts found. Create your first script above! (files will appear in api/scripts/ on real server)</div>';
      return;
    }
    // For each script, fetch content (if list doesn't contain full content)
    const cardsHtml = [];
    for (let idx = 0; idx < scriptsList.length; idx++) {
      const scriptItem = scriptsList[idx];
      const filename = typeof scriptItem === 'string' ? scriptItem : scriptItem.name;
      let content = (typeof scriptItem === 'object' && scriptItem.content) ? scriptItem.content : '';
      if (!content) content = await loadScriptContent(filename);
      // create unique card id
      const cardId = `script_card_${idx}_${Date.now()}_${Math.random()}`.replace(/[^a-z0-9]/gi, '');
      cardsHtml.push(`
        <div class="script-card" data-filename="${escapeHtml(filename)}" id="${cardId}">
          <div class="script-header">
            <span class="script-name">📄 ${escapeHtml(filename)}</span>
            <div class="script-actions">
              <button class="edit-btn" data-action="edit" data-file="${escapeHtml(filename)}">✏️ Edit</button>
              <button class="delete-btn" data-action="delete" data-file="${escapeHtml(filename)}">🗑️ Delete</button>
            </div>
          </div>
          <div class="script-content" id="content-${cardId}">
            <div class="script-preview" id="preview-${cardId}">${escapeHtml(content) || '<em>(empty script)</em>'}</div>
          </div>
        </div>
      `);
    }
    scriptsContainer.innerHTML = cardsHtml.join('');
    // attach event listeners for edit & delete after render
    for (let i = 0; i < scriptsList.length; i++) {
      const scriptEntry = scriptsList[i];
      const filename = typeof scriptEntry === 'string' ? scriptEntry : scriptEntry.name;
      const cardElement = document.querySelector(`.script-card[data-filename="${CSS.escape(filename)}"]`);
      if (!cardElement) continue;
      const editBtn = cardElement.querySelector('.edit-btn');
      const deleteBtn = cardElement.querySelector('.delete-btn');
      if (editBtn) {
        editBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          enableInlineEditing(filename, cardElement);
        });
      }
      if (deleteBtn) {
        deleteBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (confirm(`Delete script "${filename}" permanently?`)) {
            const ok = await deleteScriptFile(filename);
            if (ok) {
              setStatus(`✅ Deleted: ${filename}`);
              await renderAdminScripts();
            } else {
              setStatus(`❌ Delete failed for ${filename}`, true);
            }
          }
        });
      }
    }
  }
  
  // enable inline editing mode for a script card
  async function enableInlineEditing(filename, cardElement) {
    const currentContent = await loadScriptContent(filename);
    const contentDiv = cardElement.querySelector('.script-content');
    if (!contentDiv) return;
    const editorId = `editor_${Date.now()}_${Math.random()}`;
    contentDiv.innerHTML = `
      <textarea id="${editorId}" class="script-editor" spellcheck="false">${escapeHtml(currentContent)}</textarea>
      <div style="display: flex; gap: 12px; margin-top: 12px;">
        <button class="save-btn" data-save="${filename}">💾 Save changes</button>
        <button class="cancel-btn" data-cancel="${filename}">↩️ Cancel</button>
      </div>
    `;
    const textarea = document.getElementById(editorId);
    const saveButton = contentDiv.querySelector('.save-btn');
    const cancelButton = contentDiv.querySelector('.cancel-btn');
    saveButton.addEventListener('click', async () => {
      const newContent = textarea.value;
      const success = await saveScriptFile(filename, newContent);
      if (success) {
        setStatus(`📝 Script "${filename}" saved. (API ready)`);
        await renderAdminScripts();
      } else {
        setStatus(`❌ Failed to save "${filename}"`, true);
      }
    });
    cancelButton.addEventListener('click', async () => {
      await renderAdminScripts();
    });
  }
  
  // create new script file (makes new file in api/scripts)
  async function handleCreateScript() {
    let name = newScriptName.value.trim();
    const content = newScriptContent.value;
    if (!name) {
      setStatus("⚠️ Please enter a script filename (e.g., init.sh)", true);
      return;
    }
    // sanitize filename: avoid path traversal
    name = name.replace(/\.\./g, '').replace(/[\/\\]/g, '');
    if (name.length === 0) {
      setStatus("Invalid filename", true);
      return;
    }
    // check duplicate in current list (mock & real)
    const existing = await fetchScriptList();
    const exists = existing.some(s => (typeof s === 'string' ? s : s.name) === name);
    if (exists) {
      setStatus(`❌ Script "${name}" already exists. Use edit or different name.`, true);
      return;
    }
    const success = await saveScriptFile(name, content || "# new script");
    if (success) {
      setStatus(`✨ Created new script: ${name} (file would be inside api/scripts/)`);
      newScriptName.value = '';
      newScriptContent.value = '';
      await renderAdminScripts();
    } else {
      setStatus(`❌ Could not create ${name}`, true);
    }
  }
  
  // refresh scripts manually
  async function refreshScripts() {
    if (!currentSession) return;
    await renderAdminScripts();
    setStatus("🔄 Script list refreshed.");
  }
  
  // simple escape helper
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }
  
  // LOGIC for login
  function attemptLogin() {
    const pass = passwordInput.value;
    if (pass === ADMIN_PASSWORD) {
      currentSession = true;
      loginViewDiv.style.display = 'none';
      adminPanelDiv.style.display = 'block';
      loginErrorSpan.style.display = 'none';
      renderAdminScripts();
    } else {
      loginErrorSpan.style.display = 'block';
      loginErrorSpan.innerText = '❌ Wrong password — access denied (karah123)';
      passwordInput.value = '';
    }
  }
  
  // initialization: attach login event, creation, refresh
  loginBtn.addEventListener('click', attemptLogin);
  passwordInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') attemptLogin(); });
  createScriptBtn.addEventListener('click', handleCreateScript);
  refreshBtn.addEventListener('click', refreshScripts);
  
  // Also include extra note: console info about backend API expected endpoints for real file system.
  console.log("✅ Admin panel ready | Password: karah123 | Scripts stored in localStorage mock + ready for /api/scripts/ endpoints");
  console.log("👉 To enable real file storage: implement GET /api/scripts/ (list JSON), PUT /api/scripts/:filename, DELETE /api/scripts/:filename");
  console.log("👉 Real file structure should map to 'api/scripts/' directory inside GitHub project.");
  
  // initial state
  loginViewDiv.style.display = 'flex';
  adminPanelDiv.style.display = 'none';
</script>
</body>
</html>
