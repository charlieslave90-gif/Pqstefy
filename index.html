<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pastefy Control Panel · API Manager</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f7 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 2rem 1.5rem;
            color: #1a2634;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header & key area */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            background: white;
            padding: 1rem 2rem;
            border-radius: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            backdrop-filter: blur(2px);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1F3B4C, #2C5F7A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .badge {
            background: #eef2ff;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e4a6e;
        }

        .api-section {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            background: #ffffffcc;
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-radius: 60px;
        }

        .api-key-input {
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            font-family: monospace;
            font-size: 0.85rem;
            width: 280px;
            background: #fefefe;
            transition: 0.2s;
        }

        .api-key-input:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }

        button {
            background: #1f4e6e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        button:hover {
            background: #0f3b54;
            transform: translateY(-1px);
        }

        button.secondary {
            background: #e2e8f0;
            color: #1e293b;
            border: 1px solid #cbd5e1;
        }

        button.secondary:hover {
            background: #cbd5e1;
        }

        button.danger {
            background: #b91c1c;
        }
        button.danger:hover {
            background: #991b1b;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
            margin-bottom: 2rem;
        }

        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.2s;
            border: 1px solid #eef2f6;
        }

        .card h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #2c7da0;
            padding-left: 0.75rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            font-weight: 500;
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            color: #2c3e50;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            border: 1px solid #cfdee9;
            font-family: inherit;
            background: #fafcff;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .paste-list {
            margin-top: 1.5rem;
            max-height: 380px;
            overflow-y: auto;
        }

        .paste-item {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.7rem;
            border-left: 3px solid #2c7da0;
            transition: 0.1s;
        }

        .paste-title {
            font-weight: 700;
            word-break: break-word;
        }

        .paste-meta {
            font-size: 0.7rem;
            color: #5b6e8c;
            display: flex;
            gap: 1rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }

        .actions {
            margin-top: 0.6rem;
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 0.25rem 0.8rem;
            font-size: 0.7rem;
        }

        .status {
            background: #f1f5f9;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            margin-top: 1rem;
            font-family: monospace;
        }

        .error-status {
            color: #b91c1c;
            background: #fee2e2;
        }

        .success-status {
            color: #166534;
            background: #dcfce7;
        }

        hr {
            margin: 1rem 0;
            border-color: #e9edf2;
        }

        @media (max-width: 780px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }
            body {
                padding: 1rem;
            }
            .api-key-input {
                width: 100%;
            }
        }
        .star-badge {
            font-size: 0.7rem;
            background: #fde04720;
            padding: 0.2rem 0.5rem;
            border-radius: 30px;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <h1>📋 Pastefy Controller</h1>
            <div class="badge">API v2 · realtime control</div>
        </div>
        <div class="api-section">
            <input type="text" id="apiKeyInput" class="api-key-input" placeholder="Paste your API key" value="BuAyZNqRw61RPkZtpfsrx8CBmkhZHOwHN3zn37nIIm4xlxEkH3xvc59kVFIV">
            <button id="saveKeyBtn">🔑 Set & Load</button>
        </div>
    </div>

    <div class="grid-2col">
        <!-- left panel: create / edit / delete -->
        <div class="card">
            <h2>✍️ Create / Edit Paste</h2>
            <div class="form-group">
                <label>Paste ID (for edit/delete, leave blank for create)</label>
                <input type="text" id="pasteIdField" placeholder="Leave empty to create new paste">
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="pasteTitle" placeholder="My awesome snippet">
            </div>
            <div class="form-group">
                <label>Content *</label>
                <textarea id="pasteContent" placeholder="Paste your text, code, notes ..."></textarea>
            </div>
            <div class="form-group">
                <label>Visibility (optional, default: unlisted)</label>
                <select id="pasteVisibility">
                    <option value="unlisted">Unlisted</option>
                    <option value="public">Public</option>
                    <option value="private">Private</option>
                </select>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <button id="createPasteBtn">✨ Create Paste</button>
                <button id="updatePasteBtn" class="secondary">✏️ Update Selected</button>
                <button id="deletePasteBtn" class="danger">🗑️ Delete Selected</button>
            </div>
            <div id="actionStatus" class="status">💡 Ready — actions will appear here</div>
        </div>

        <!-- right panel: list & star management -->
        <div class="card">
            <h2>📚 Your Pastes & Star Controls</h2>
            <div style="display: flex; gap: 0.6rem; margin-bottom: 1rem; flex-wrap: wrap;">
                <button id="fetchPastesBtn">🔄 Refresh My Pastes</button>
                <button id="fetchStarredBtn" class="secondary">⭐ Show Starred Pastes</button>
                <button id="fetchPublicBtn" class="secondary">🌍 Trending Public</button>
            </div>
            <div id="pastesListContainer" class="paste-list">
                <div class="status" style="text-align: center;">Click refresh to load your pastes</div>
            </div>
        </div>
    </div>

    <!-- user info & extra -->
    <div class="card" style="margin-top: 0rem;">
        <h2>👤 Account Snapshot</h2>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
            <button id="fetchUserBtn">📇 Get My Profile</button>
            <button id="fetchOverviewBtn" class="secondary">📊 User Overview (stats)</button>
        </div>
        <div id="userInfoArea" class="status" style="margin-top: 1rem; white-space: pre-wrap;">No user data loaded</div>
    </div>
</div>

<script>
    // ---------- CONFIG ----------
    const BASE_URL = 'https://pastefy.app/api/v2';
    let currentApiKey = localStorage.getItem('pastefy_api_key') || 'BuAyZNqRw61RPkZtpfsrx8CBmkhZHOwHN3zn37nIIm4xlxEkH3xvc59kVFIV';
    document.getElementById('apiKeyInput').value = currentApiKey;

    // Helper: get auth headers
    function authHeaders() {
        if (!currentApiKey) return {};
        return { 'Authorization': `Bearer ${currentApiKey}` };
    }

    // Generic fetch with error handling
    async function apiRequest(endpoint, options = {}) {
        const url = endpoint.startsWith('http') ? endpoint : `${BASE_URL}${endpoint}`;
        const headers = {
            'Content-Type': 'application/json',
            ...authHeaders(),
            ...options.headers,
        };
        try {
            const response = await fetch(url, { ...options, headers });
            let data = null;
            const contentType = response.headers.get('content-type');
            if (contentType && contentType.includes('application/json')) {
                data = await response.json();
            } else if (!response.ok) {
                const text = await response.text();
                throw new Error(`HTTP ${response.status}: ${text.substring(0, 100)}`);
            }
            if (!response.ok) {
                const errMsg = data?.message || data?.error || `Request failed (${response.status})`;
                throw new Error(errMsg);
            }
            return { data, status: response.status, ok: true };
        } catch (err) {
            console.error('API error:', err);
            return { ok: false, error: err.message };
        }
    }

    // update status display (action feedback)
    function setActionStatus(msg, isError = false) {
        const statusDiv = document.getElementById('actionStatus');
        statusDiv.innerText = msg;
        statusDiv.className = `status ${isError ? 'error-status' : 'success-status'}`;
        setTimeout(() => {
            if (document.getElementById('actionStatus') === statusDiv) {
                statusDiv.className = 'status';
            }
        }, 4000);
    }

    function setUserInfo(text, isError = false) {
        const area = document.getElementById('userInfoArea');
        area.innerText = text;
        area.className = `status ${isError ? 'error-status' : 'success-status'}`;
    }

    // ---- Render pastes list with star & delete/edit actions ----
    function renderPastesList(pastes, isStarredView = false) {
        const container = document.getElementById('pastesListContainer');
        if (!pastes || pastes.length === 0) {
            container.innerHTML = '<div class="status">✨ No pastes found. Create one!</div>';
            return;
        }
        container.innerHTML = '';
        pastes.forEach(paste => {
            const pasteId = paste.id || paste._id;
            const title = paste.title || 'Untitled paste';
            const contentPreview = paste.content ? (paste.content.length > 80 ? paste.content.substring(0, 80) + '…' : paste.content) : '(empty)';
            const createdAt = paste.created_at ? new Date(paste.created_at).toLocaleString() : 'unknown';
            const visibility = paste.visibility || '—';
            const starCount = paste.stars ?? (paste.star_count ?? 0);
            const isStarredByMe = paste.starred || false;

            const div = document.createElement('div');
            div.className = 'paste-item';
            div.innerHTML = `
                <div class="paste-title">📄 ${escapeHtml(title)} <span style="font-size:0.7rem; background:#eef2ff; padding:2px 8px; border-radius:20px;">${escapeHtml(pasteId)}</span></div>
                <div class="paste-meta">
                    <span>📅 ${escapeHtml(createdAt)}</span>
                    <span>🔒 ${escapeHtml(visibility)}</span>
                    <span>⭐ ${starCount} stars</span>
                    ${isStarredByMe ? '<span class="star-badge">★ starred by you</span>' : ''}
                </div>
                <div class="paste-meta">📝 ${escapeHtml(contentPreview)}</div>
                <div class="actions">
                    <button class="btn-sm edit-paste-btn" data-id="${escapeHtml(pasteId)}" data-title="${escapeHtml(title)}" data-content="${escapeHtml(paste.content || '')}" data-vis="${escapeHtml(visibility)}">✏️ Edit</button>
                    <button class="btn-sm danger delete-quick-btn" data-id="${escapeHtml(pasteId)}">🗑️ Delete</button>
                    ${!isStarredView ? `<button class="btn-sm star-toggle-btn" data-id="${escapeHtml(pasteId)}" data-starred="${isStarredByMe}">${isStarredByMe ? '★ Unstar' : '☆ Star'}</button>` : `<button class="btn-sm star-toggle-btn" data-id="${escapeHtml(pasteId)}" data-starred="true">★ Unstar</button>`}
                    <button class="btn-sm view-raw-btn" data-id="${escapeHtml(pasteId)}">📄 Raw</button>
                </div>
            `;
            container.appendChild(div);
        });

        // attach dynamic events
        document.querySelectorAll('.edit-paste-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const title = btn.getAttribute('data-title');
                const content = btn.getAttribute('data-content');
                const vis = btn.getAttribute('data-vis');
                document.getElementById('pasteIdField').value = id;
                document.getElementById('pasteTitle').value = title;
                document.getElementById('pasteContent').value = content;
                document.getElementById('pasteVisibility').value = vis;
                setActionStatus(`Loaded paste "${id}" for editing`, false);
            });
        });

        document.querySelectorAll('.delete-quick-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                if (confirm(`Delete paste "${id}" permanently?`)) {
                    await deletePasteById(id);
                    await fetchMyPastes();  // refresh list
                }
            });
        });

        document.querySelectorAll('.star-toggle-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                const currentlyStarred = btn.getAttribute('data-starred') === 'true';
                if (currentlyStarred) {
                    await unstarPaste(id);
                } else {
                    await starPaste(id);
                }
                await fetchMyPastes();    // refresh list
                setActionStatus(`⭐ Star toggled on ${id}`, false);
            });
        });

        document.querySelectorAll('.view-raw-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                await fetchRawPaste(id);
            });
        });
    }

    async function fetchRawPaste(pasteId) {
        const result = await apiRequest(`/paste/${pasteId}/raw`, { method: 'GET' });
        if (result.ok && result.data) {
            const rawContent = typeof result.data === 'string' ? result.data : JSON.stringify(result.data);
            alert(`📄 RAW content for ${pasteId}:\n\n${rawContent.substring(0, 2000)}`);
            setActionStatus(`Raw content loaded for ${pasteId}`);
        } else {
            setActionStatus(`Failed to get raw: ${result.error}`, true);
        }
    }

    async function starPaste(pasteId) {
        const result = await apiRequest(`/paste/${pasteId}/star`, { method: 'POST' });
        if (!result.ok) setActionStatus(`Star failed: ${result.error}`, true);
        return result.ok;
    }

    async function unstarPaste(pasteId) {
        const result = await apiRequest(`/paste/${pasteId}/star`, { method: 'DELETE' });
        if (!result.ok) setActionStatus(`Unstar failed: ${result.error}`, true);
        return result.ok;
    }

    async function deletePasteById(pasteId) {
        const result = await apiRequest(`/paste/${pasteId}`, { method: 'DELETE' });
        if (result.ok) {
            setActionStatus(`✅ Paste ${pasteId} deleted.`);
            return true;
        } else {
            setActionStatus(`Delete error: ${result.error}`, true);
            return false;
        }
    }

    // fetch my pastes (GET /user/pastes)
    async function fetchMyPastes() {
        if (!currentApiKey) { setActionStatus("⚠️ Set API key first", true); return; }
        const result = await apiRequest('/user/pastes', { method: 'GET' });
        if (result.ok && result.data) {
            let pastes = Array.isArray(result.data) ? result.data : (result.data.pastes || []);
            renderPastesList(pastes, false);
            setActionStatus(`Loaded ${pastes.length} pastes`);
        } else {
            renderPastesList([], false);
            setActionStatus(`Could not load pastes: ${result.error}`, true);
        }
    }

    // fetch starred pastes (GET /user/starred)
    async function fetchStarredPastes() {
        if (!currentApiKey) { setActionStatus("No API key", true); return; }
        const result = await apiRequest('/user/starred', { method: 'GET' });
        if (result.ok && result.data) {
            let starred = Array.isArray(result.data) ? result.data : (result.data.starred || result.data.pastes || []);
            renderPastesList(starred, true);
            setActionStatus(`⭐ ${starred.length} starred pastes`);
        } else {
            setActionStatus(`Failed starred: ${result.error}`, true);
        }
    }

    // trending public pastes
    async function fetchTrendingPublic() {
        const result = await apiRequest('/pastes/trending', { method: 'GET' });
        if (result.ok && result.data) {
            let trending = Array.isArray(result.data) ? result.data : (result.data.pastes || []);
            renderPastesList(trending, false);
            setActionStatus(`🌍 Trending public pastes (${trending.length})`);
        } else {
            setActionStatus(`Trending error: ${result.error}`, true);
        }
    }

    // create new paste
    async function createPaste() {
        const title = document.getElementById('pasteTitle').value;
        const content = document.getElementById('pasteContent').value;
        const visibility = document.getElementById('pasteVisibility').value;
        if (!content.trim()) { setActionStatus("Content cannot be empty", true); return; }
        const payload = { title, content, visibility };
        const result = await apiRequest('/paste', { method: 'POST', body: JSON.stringify(payload) });
        if (result.ok && result.data) {
            setActionStatus(`✅ Paste created! ID: ${result.data.id || 'success'}`, false);
            document.getElementById('pasteIdField').value = '';
            document.getElementById('pasteTitle').value = '';
            document.getElementById('pasteContent').value = '';
            await fetchMyPastes();
        } else {
            setActionStatus(`Create failed: ${result.error}`, true);
        }
    }

    // update existing paste (PUT)
    async function updatePaste() {
        const pasteId = document.getElementById('pasteIdField').value.trim();
        if (!pasteId) { setActionStatus("Please provide a Paste ID to update", true); return; }
        const title = document.getElementById('pasteTitle').value;
        const content = document.getElementById('pasteContent').value;
        const visibility = document.getElementById('pasteVisibility').value;
        if (!content.trim() && !title) { setActionStatus("At least content or title needed", true); return; }
        const payload = { title, content, visibility };
        const result = await apiRequest(`/paste/${pasteId}`, { method: 'PUT', body: JSON.stringify(payload) });
        if (result.ok) {
            setActionStatus(`✏️ Paste ${pasteId} updated successfully`, false);
            await fetchMyPastes();
        } else {
            setActionStatus(`Update error: ${result.error}`, true);
        }
    }

    async function deleteSelected() {
        const pasteId = document.getElementById('pasteIdField').value.trim();
        if (!pasteId) { setActionStatus("No Paste ID selected for deletion", true); return; }
        if (confirm(`Delete paste ${pasteId}?`)) {
            const ok = await deletePasteById(pasteId);
            if (ok) {
                document.getElementById('pasteIdField').value = '';
                await fetchMyPastes();
            }
        }
    }

    // get current user info
    async function fetchUser() {
        const result = await apiRequest('/user', { method: 'GET' });
        if (result.ok && result.data) {
            const user = result.data;
            setUserInfo(`👤 Username: ${user.username || user.name || 'N/A'} | Email: ${user.email || 'private'} | ID: ${user.id || '—'} | Created: ${user.created_at ? new Date(user.created_at).toLocaleDateString() : '—'}\n📦 Additional: ${JSON.stringify(user, null, 2)}`);
        } else {
            setUserInfo(`Error fetching user: ${result.error}`, true);
        }
    }

    async function fetchOverview() {
        const result = await apiRequest('/user/overview', { method: 'GET' });
        if (result.ok && result.data) {
            setUserInfo(`📊 Overview stats:\n${JSON.stringify(result.data, null, 2)}`);
        } else {
            setUserInfo(`Overview failed: ${result.error}`, true);
        }
    }

    function saveApiKey() {
        const newKey = document.getElementById('apiKeyInput').value.trim();
        if (newKey) {
            currentApiKey = newKey;
            localStorage.setItem('pastefy_api_key', newKey);
            setActionStatus("API Key saved & active", false);
        } else {
            setActionStatus("Invalid API key", true);
        }
    }

    // event binding
    document.getElementById('saveKeyBtn').addEventListener('click', saveApiKey);
    document.getElementById('createPasteBtn').addEventListener('click', createPaste);
    document.getElementById('updatePasteBtn').addEventListener('click', updatePaste);
    document.getElementById('deletePasteBtn').addEventListener('click', deleteSelected);
    document.getElementById('fetchPastesBtn').addEventListener('click', fetchMyPastes);
    document.getElementById('fetchStarredBtn').addEventListener('click', fetchStarredPastes);
    document.getElementById('fetchPublicBtn').addEventListener('click', fetchTrendingPublic);
    document.getElementById('fetchUserBtn').addEventListener('click', fetchUser);
    document.getElementById('fetchOverviewBtn').addEventListener('click', fetchOverview);

    // initial load on start
    if (currentApiKey) {
        fetchMyPastes().catch(console.warn);
        fetchUser().catch(console.warn);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
</script>
</body>
</html>
