<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>scriptbin - raw script pastebin</title>
</head>
<body style="font-family: monospace; max-width: 900px; margin: 20px auto; padding: 0 20px;">
    <h1>📜 scriptbin</h1>
    <p>raw script storage — <a href="/api/">list all scripts</a> | append filename for raw view: <code>/api/scriptname</code></p>
    
    <hr>
    
    <div id="public">
        <h3>📄 all public scripts (raw available)</h3>
        <div id="public-list">loading...</div>
    </div>
    
    <hr>
    
    <div id="login-section">
        <h3>🔐 admin edit panel</h3>
        <input type="password" id="password" placeholder="password (karah123)">
        <button id="unlock">unlock editor</button>
        <span id="login-error" style="color:red;"></span>
    </div>
    
    <div id="admin-panel" style="display:none;">
        <div id="admin-status" style="background:#e0ffe0; padding:5px;"></div>
        
        <h4>✏️ edit existing scripts</h4>
        <div id="script-list">loading...</div>
        
        <h4>➕ create new script</h4>
        <input type="text" id="new-name" placeholder="filename (e.g., myscript.sh)" style="width: 300px;"><br>
        <textarea id="new-content" rows="8" cols="70" placeholder="paste script content here..."></textarea><br>
        <button id="create-btn">create script</button>
        <button id="refresh-btn">refresh list</button>
    </div>
    
    <script>
        const API_BASE = '/api/';
        let adminPassword = null;
        
        async function fetchWithAuth(url, options = {}) {
            const headers = options.headers || {};
            if (adminPassword) headers['X-Password'] = adminPassword;
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) {
                alert('wrong password or session expired');
                adminPassword = null;
                location.reload();
            }
            return res;
        }
        
        async function listScripts() {
            const res = await fetch(API_BASE);
            if (res.ok) return await res.json();
            return [];
        }
        
        async function loadRawScript(filename) {
            const res = await fetch(API_BASE + encodeURIComponent(filename));
            if (res.ok) return await res.text();
            return '';
        }
        
        async function saveScript(filename, content) {
            const res = await fetchWithAuth(API_BASE + encodeURIComponent(filename), {
                method: 'PUT',
                body: content
            });
            return res.ok;
        }
        
        async function deleteScript(filename) {
            const res = await fetchWithAuth(API_BASE + encodeURIComponent(filename), {
                method: 'DELETE'
            });
            return res.ok;
        }
        
        async function renderPublic() {
            const scripts = await listScripts();
            const container = document.getElementById('public-list');
            if (scripts.length === 0) {
                container.innerHTML = '<i>no scripts yet</i>';
                return;
            }
            let html = '<ul>';
            for (let s of scripts) {
                html += `<li style="margin-bottom:15px;">
                    <strong>${escapeHtml(s)}</strong><br>
                    🔗 raw: <a href="${API_BASE}${encodeURIComponent(s)}" target="_blank">${API_BASE}${s}</a>
                    <button class="view-raw" data-file="${escapeAttr(s)}">preview raw</button>
                    <pre id="preview-${escapeAttr(s)}" style="display:none; background:#f5f5f5; padding:8px; overflow:auto; font-size:12px;"></pre>
                </li>`;
            }
            html += '</ul>';
            container.innerHTML = html;
            
            for (let s of scripts) {
                const btn = container.querySelector(`.view-raw[data-file="${escapeAttr(s)}"]`);
                if (btn) {
                    btn.onclick = async () => {
                        const pre = document.getElementById(`preview-${escapeAttr(s)}`);
                        if (pre.style.display === 'none') {
                            const content = await loadRawScript(s);
                            pre.textContent = content || '(empty)';
                            pre.style.display = 'block';
                            btn.textContent = 'hide';
                        } else {
                            pre.style.display = 'none';
                            btn.textContent = 'preview raw';
                        }
                    };
                }
            }
        }
        
        async function renderAdmin() {
            if (!adminPassword) return;
            const scripts = await listScripts();
            const container = document.getElementById('script-list');
            if (scripts.length === 0) {
                container.innerHTML = '<i>no scripts</i>';
                return;
            }
            let html = '';
            for (let s of scripts) {
                const content = await loadRawScript(s);
                const preview = content.length > 100 ? content.substring(0,100) + '...' : content;
                html += `
                <div style="border:1px solid #ccc; margin:10px 0; padding:10px;">
                    <strong>${escapeHtml(s)}</strong>
                    <a href="${API_BASE}${encodeURIComponent(s)}" target="_blank" style="margin-left:10px;">[raw]</a>
                    <button class="edit-btn" data-file="${escapeAttr(s)}">edit</button>
                    <button class="delete-btn" data-file="${escapeAttr(s)}">delete</button>
                    <div class="edit-area-${escapeAttr(s)}" style="display:none; margin-top:10px;">
                        <textarea class="edit-textarea" data-file="${escapeAttr(s)}" rows="6" style="width:95%; font-family:monospace;">${escapeHtml(content)}</textarea><br>
                        <button class="save-edit" data-file="${escapeAttr(s)}">save</button>
                        <button class="cancel-edit" data-file="${escapeAttr(s)}">cancel</button>
                    </div>
                    <pre style="background:#f0f0f0; padding:5px; margin-top:5px; font-size:12px; overflow:auto;">${escapeHtml(preview) || '(empty)'}</pre>
                </div>`;
            }
            container.innerHTML = html;
            
            for (let s of scripts) {
                const editBtn = container.querySelector(`.edit-btn[data-file="${escapeAttr(s)}"]`);
                const deleteBtn = container.querySelector(`.delete-btn[data-file="${escapeAttr(s)}"]`);
                const editArea = container.querySelector(`.edit-area-${escapeAttr(s)}`);
                
                if (editBtn) {
                    editBtn.onclick = () => {
                        if (editArea.style.display === 'none') {
                            editArea.style.display = 'block';
                            editBtn.textContent = 'cancel';
                        } else {
                            editArea.style.display = 'none';
                            editBtn.textContent = 'edit';
                        }
                    };
                }
                
                if (deleteBtn) {
                    deleteBtn.onclick = async () => {
                        if (confirm(`delete ${s}?`)) {
                            if (await deleteScript(s)) {
                                document.getElementById('admin-status').innerHTML = `✅ deleted ${s}`;
                                renderAdmin();
                                renderPublic();
                            }
                        }
                    };
                }
                
                const saveBtn = container.querySelector(`.save-edit[data-file="${escapeAttr(s)}"]`);
                const cancelBtn = container.querySelector(`.cancel-edit[data-file="${escapeAttr(s)}"]`);
                const textarea = container.querySelector(`.edit-textarea[data-file="${escapeAttr(s)}"]`);
                
                if (saveBtn) {
                    saveBtn.onclick = async () => {
                        const newContent = textarea.value;
                        if (await saveScript(s, newContent)) {
                            document.getElementById('admin-status').innerHTML = `✅ saved ${s}`;
                            editArea.style.display = 'none';
                            editBtn.textContent = 'edit';
                            renderAdmin();
                            renderPublic();
                        }
                    };
                }
                
                if (cancelBtn) {
                    cancelBtn.onclick = () => {
                        editArea.style.display = 'none';
                        editBtn.textContent = 'edit';
                    };
                }
            }
        }
        
        async function createScript() {
            const name = document.getElementById('new-name').value.trim();
            const content = document.getElementById('new-content').value;
            if (!name) {
                document.getElementById('admin-status').innerHTML = '❌ enter filename';
                return;
            }
            if (await saveScript(name, content || '# new script')) {
                document.getElementById('admin-status').innerHTML = `✅ created ${name}`;
                document.getElementById('new-name').value = '';
                document.getElementById('new-content').value = '';
                renderAdmin();
                renderPublic();
            } else {
                document.getElementById('admin-status').innerHTML = '❌ create failed';
            }
        }
        
        function unlock() {
            const pass = document.getElementById('password').value;
            if (pass === 'karah123') {
                adminPassword = pass;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                renderAdmin();
            } else {
                document.getElementById('login-error').innerHTML = 'wrong password (karah123)';
            }
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function escapeAttr(str) {
            return String(str).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }
        
        document.getElementById('unlock').onclick = unlock;
        document.getElementById('create-btn').onclick = createScript;
        document.getElementById('refresh-btn').onclick = () => { renderAdmin(); renderPublic(); };
        
        renderPublic();
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') unlock();
        });
    </script>
</body>
</html>
